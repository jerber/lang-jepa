decoder:
  hidden_dim: 1536      # 2x the encoder embed_dim
  num_layers: 4
  num_heads: 8
  dropout: 0.1
  max_length: 128

training:
  batch_size: 32
  learning_rate: 0.0001
  num_epochs: 10
  weight_decay: 0.01
  grad_clip: 1.0
  grad_accum_steps: 1
  eval_ratio: 0.1
  output_dir: "outputs/decoder"

evaluation:
  eval_steps: 100
  save_steps: 1000
  num_samples: 5
