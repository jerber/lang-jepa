data:
  # Dataset configuration
  train_file: "sample-10BT"       # FineWeb-Edu dataset slice
  batch_size: 32
  num_workers: 4
  tokenizer_path: "roberta-base"  # Base tokenizer. Also the base weights if pretrained=true.
# tokenizer_path: "bert-base-uncased"
# tokenizer_path: "gpt2"
  limit: 10000                    # Docs to stream. Laptop users: dial down (e.g. 200).
  min_length: 100                 # Minimum text length in chars
  min_sentences: 2                # Need >=2 sentences to form a context/target pair
  window_size: 8                  # Context = previous N sentences
  val_fraction: 0.0               # Hash-based held-out val fraction (per document)
  streaming: false                # True for cluster-scale runs; must set max_steps
  shuffle_buffer: 10000           # Streaming shuffle buffer size
  splitter_device: "cpu"          # Keep sentence splitter off the training GPU

model:
  max_length: 512                 # RoBERTa-base's limit; enough to fit ~8-sentence context
  pred_dim: 768                   # Match embed_dim: no target-side projection (I-JEPA style)
  embed_dim: 768                  # RoBERTa-base hidden size
  num_layers: 12
  num_heads: 12
  mlp_ratio: 4.0
  dropout: 0.1
  pretrained: true                # Start from AutoModel.from_pretrained(tokenizer_path)

optimization:
  epochs: 5
  lr: 0.0001                      # Lowered for 124M transformer (was 1e-3, too aggressive)
  warmup: 2                       # Warmup epochs
  weight_decay: 0.04
  final_weight_decay: 0.4
  final_lr: 0.000001
  loss_fn: "smooth_l1"            # "smooth_l1" on normalized features, or "cosine"
  momentum_start: 0.996           # EMA target encoder momentum (I-JEPA default)
  momentum_end: 1.0
  grad_accum_steps: 1             # Effective batch = batch_size * accum * world_size
  max_steps: null                 # Required when data.streaming=true

logging:
  log_dir: "logs/lang_jepa"
  log_freq: 50
  checkpoint_freq: 1
  num_examples: 3
  log_to_wandb: false             # Flip to true if WANDB_API_KEY is set

meta:
  use_bfloat16: false
  load_checkpoint: false
  checkpoint_path: null
  use_gradient_checkpointing: false
